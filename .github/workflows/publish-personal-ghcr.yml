name: Publish Personal Sub2 Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-personal-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/general-brash/personal_sub2

jobs:
  publish:
    name: Build and publish multi-platform image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          if [[ -z "$VERSION" ]]; then
            echo "backend/cmd/server/VERSION must not be empty" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=personal-sub2-amd64
          cache-to: type=gha,mode=max,scope=personal-sub2-amd64
          provenance: false
          sbom: false
