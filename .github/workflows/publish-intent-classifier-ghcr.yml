name: Publish Intent Classifier Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to publish'
        required: true
        type: string
        default: 'v0.1.6-P1.2'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-intent-classifier-${{ github.ref }}-${{ inputs.version || '' }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/general-brash/personal_sub2-intent-classifier
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  publish:
    name: Build and publish classifier image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Resolve source metadata
        id: source
        shell: bash
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${VERSION}" >&2
            exit 1
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
            type=raw,value=sha-${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.title=Sub2API Intent Classifier
            org.opencontainers.image.description=ONNX secondary-review inference service for Sub2API
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/intent-classifier
          file: ./services/intent-classifier/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=intent-classifier
          cache-to: type=gha,mode=max,scope=intent-classifier
          provenance: false
          sbom: false
